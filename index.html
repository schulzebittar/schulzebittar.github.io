<!DOCTYPE html>
<html>
<head>
    <title>Site</title>
</head>
<body>
    <h1>Before/After</h1>
    <div class="slider-container">
      <!-- The "After" or background image -->
      <img src="after.jpg" alt="After" class="slider-image">
  
      <!-- The "Before" image container that gets resized -->
      <div class="img-reveal">
        <img src="before.jpg" alt="Before" class="slider-image">
      </div>
  
      <!-- The interactive native range input -->
      <input type="range" min="0" max="100" value="50" class="slider-input" id="slider">
  
      <!-- Optional: Visual custom divider line and handle arrows -->
      <div class="slider-button" id="slider-button"></div>
    </div>
</body>
</html>
